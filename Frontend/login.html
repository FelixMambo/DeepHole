<!doctype html>
<html lang="pt">
    <head>
        <title>DeepHole - Login</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/login.css" />
        <link rel="icon" href="assets/icons/DeepHole.png" />
        <link
            href="https://fonts.cdnfonts.com/css/nasalization-2"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="login-container">
            <img src="assets/icons/DeepHole.png" alt="DeepHole" class="logo" />
            <h1 class="a">DeepHole</h1>

            <div class="caixa">
                <br />
                <h3>Login</h3>

                <p>E-mail</p>
                <input type="text" placeholder="Username" class="username" />

                <p>Password</p>
                <input
                    type="password"
                    placeholder="Password"
                    class="password"
                />
                <br />
                <br />

                <button class="entrar" type="submit">Entrar</button>

                <h6>Nao tenho conta <a href="register.html">Cadastre-se</a></h6>
                <br />
            </div>
            <br />
            <br />
            <h6>© 2026 DeepHole. Todos os direitos reservados.</h6>
        </div>
    </body>
</html>
